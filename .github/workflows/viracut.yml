name: VIRACUT
on:
  workflow_dispatch:
    inputs:
      gist_id:
        description: Gist ID
        required: true
        type: string
      token:
        description: Token
        required: true
        type: string
jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Render
        env:
          GIST_ID: ${{ inputs.gist_id }}
          GH_TOKEN: ${{ inputs.token }}
        run: |
          sudo apt-get install -y ffmpeg -q
          curl -sL -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/gists/$GIST_ID" | python3 -c "import sys,json;f=list(json.load(sys.stdin)['files'].values())[0];open('p.json','w').write(f['content']);print('payload',len(f['content']),'bytes')"
          echo  | base64 -d > render.py
          python3 render.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: viracut-output
          path: output.mp4
          retention-days: 1
