name: VIRACUT
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render
        run: python3 render.py

      - name: Push Result
        run: |
          git config --global user.name "Viracut-Bot"
          git config --global user.email "bot@viracut.com"
          git add result.json
          git commit -m "Upload video" || exit 0
          git push origin main
