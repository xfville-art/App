name: VIRACUT
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write # CRUCIAL : Autorise l'écriture du résultat
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Render
        run: python3 render.py

      - name: Commit et Push du résultat
        run: |
          git config --global user.name "Viracut-Bot"
          git config --global user.email "actions@github.com"
          git add result.json
          git commit -m "Vidéo prête pour téléchargement" || echo "Pas de changement"
          git push
