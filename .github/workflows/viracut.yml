name: VIRACUT
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Render Video
        run: |
          # Le fichier p.json est déjà là grâce au checkout
          python3 render.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: viracut-output
          path: output.mp4
          retention-days: 1
          
