name: VIRACUT
on:
  workflow_dispatch:
    inputs:
      gist_id:
        required: true
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: FFmpeg Render
        run: |
          sudo apt-get install -y ffmpeg
          curl -sL https://api.github.com/gists/${{ github.event.inputs.gist_id }} | jq -r '.files["payload.json"].content' > p.json
          python3 -c "
import json, base64, subprocess, os
with open('p.json') as f: p = json.load(f)
for i, v in enumerate(p['videos']):
    with open(f'v{i}.mp4', 'wb') as fv: fv.write(base64.b64decode(v['data']))
inputs = []
for i in range(len(p['videos'])):
    inputs += ['-i', f'v{i}.mp4']
cmd = ['ffmpeg', '-y'] + inputs + ['-filter_complex', 'concat=n='+str(len(p['videos']))+':v=1:a=1[v][a]', '-map', '[v]', '-map', '[a]', '-c:v', 'libx264', '-preset', 'veryfast', '-crf', '22', '-vsync', 'cfr', '-r', '30', '-async', '1', 'out.mp4']
subprocess.run(cmd)
"
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: output
          path: out.mp4