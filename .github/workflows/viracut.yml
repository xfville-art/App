name: VIRACUT
on:
  workflow_dispatch:
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Build Video
        run: python render.py
      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: video-finale
          path: output.mp4
          if-no-files-found: error # Bloque l'action en rouge si le fichier est absent
