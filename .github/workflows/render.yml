name: RENDU_PRO
on:
  workflow_dispatch:
    inputs:
      release_id:
        required: true
jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Process
        run: |
          sudo apt-get install -y ffmpeg jq
          RELEASE_DATA=$(curl -sH "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/${{ github.repository }}/releases/${{ github.event.inputs.release_id }}")
          ASSET_URL=$(echo "$RELEASE_DATA" | jq -r '.assets[0].url')
          curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "Accept: application/octet-stream" "$ASSET_URL" > input.mp4
          ffmpeg -i input.mp4 -c:v libx264 -preset fast -crf 22 -vf "scale=1080:1920:force_original_aspect_ratio=increase,crop=1080:1920" output.mp4
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: final-video
          path: output.mp4